<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Changelog</title>
  <style>
    :root {
      --oracle-red:#c74634;
      --oracle-red-dark:#a6342a;
      --ink:#161513;
      --text:#312d2a;
      --muted:#5f5a55;
      --line:#d8d2ca;
      --cream:#f5f2ed;
      --sand:#ebe6df;
      --panel:#fffdf9;
      --tab:#ece7df;
      --tab-hover:#e1dbd2;
      --dark:#312d2a;
      --max:1180px;
    }

    * {
      box-sizing:border-box;
    }

    body {
      margin:0;
      background:var(--cream);
      color:var(--text);
      font-family:"Oracle Sans","Helvetica Neue",Arial,sans-serif;
      font-size:16px;
      line-height:1.5;
    }

    a {
      color:var(--oracle-red-dark);
      text-decoration:none;
      border-bottom:1px solid rgba(199,70,52,.35);
    }

    a:hover {
      border-bottom-color:currentColor;
    }

    .masthead {
      background:var(--dark);
      color:#fff;
      min-height:64px;
      display:flex;
      align-items:center;
      border-bottom:4px solid var(--oracle-red);
    }

    .masthead-inner,
    .hero-inner,
    .shell {
      width:min(var(--max),calc(100% - 40px));
      margin:0 auto;
    }

    .masthead-inner {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:24px;
    }

    .brand {
      display:inline-flex;
      align-items:center;
      gap:14px;
      font-weight:700;
      letter-spacing:.04em;
      text-transform:uppercase;
    }

    .brand-mark {
      display:inline-grid;
      place-items:center;
      border:2px solid #fff;
      border-radius:999px;
      height:28px;
      min-width:72px;
      font-size:12px;
      letter-spacing:.08em;
    }

    .brand-title {
      color:rgba(255,255,255,.82);
      font-weight:400;
      text-transform:none;
      letter-spacing:0;
    }

    .utility {
      color:rgba(255,255,255,.75);
      font-size:13px;
    }

    .hero {
      background:var(--sand);
      border-bottom:1px solid var(--line);
    }

    .hero-inner {
      padding:34px 0 42px;
    }

    .breadcrumb {
      display:flex;
      align-items:center;
      gap:8px;
      margin:0 0 24px;
      color:var(--muted);
      font-size:14px;
    }

    .breadcrumb a {
      color:var(--text);
      border-bottom:none;
    }

    .hero h1 {
      margin:0 0 14px;
      color:var(--ink);
      font-family:Georgia,"Times New Roman",serif;
      font-size:clamp(42px,6vw,72px);
      font-weight:400;
      line-height:.98;
      letter-spacing:-.035em;
    }

    .hero p {
      margin:0;
      max-width:780px;
      color:var(--muted);
      font-size:19px;
      line-height:1.45;
    }

    .hero-actions {
      margin-top:28px;
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      gap:14px;
    }

    .button {
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:44px;
      border-radius:3px;
      border:1px solid var(--oracle-red);
      background:var(--oracle-red);
      color:#fff;
      font-weight:600;
      padding:10px 22px;
      cursor:pointer;
      text-decoration:none;
    }

    .button:hover {
      background:var(--oracle-red-dark);
      border-color:var(--oracle-red-dark);
    }

    .shell {
      padding:38px 0 64px;
      display:grid;
      grid-template-columns:270px minmax(0,1fr);
      gap:46px;
    }

    .sidebar {
      align-self:start;
      position:sticky;
      top:24px;
      border-top:3px solid var(--dark);
    }

    .sidebar h2 {
      margin:0;
      background:var(--dark);
      color:#fff;
      font-size:18px;
      line-height:1;
      padding:16px 18px;
      font-weight:600;
    }

    .version-list {
      list-style:none;
      margin:0;
      padding:0;
      border-left:1px solid var(--line);
      border-right:1px solid var(--line);
      border-bottom:1px solid var(--line);
      background:var(--panel);
    }

    .version-list li + li {
      border-top:1px solid var(--line);
    }

    .version-button {
      width:100%;
      border:0;
      background:var(--tab);
      color:var(--text);
      display:grid;
      grid-template-columns:1fr auto;
      gap:10px;
      align-items:center;
      padding:16px 18px;
      text-align:left;
      cursor:pointer;
      font:inherit;
      font-weight:600;
    }

    .version-button:hover {
      background:var(--tab-hover);
    }

    .version-button.active {
      background:var(--oracle-red);
      color:#fff;
      position:relative;
    }

    .version-button.active::after {
      content:"";
      position:absolute;
      right:-13px;
      top:50%;
      transform:translateY(-50%);
      border-top:13px solid transparent;
      border-bottom:13px solid transparent;
      border-left:13px solid var(--oracle-red);
    }

    .version-date {
      font-size:12px;
      font-weight:400;
      opacity:.8;
    }

    .content {
      min-width:0;
    }

    .release-header {
      border-bottom:1px solid var(--line);
      padding-bottom:18px;
      margin-bottom:24px;
    }

    .release {
      scroll-margin-top:24px;
    }

    .release:focus {
      outline:none;
    }

    .release + .release {
      margin-top:58px;
      padding-top:42px;
      border-top:1px solid var(--line);
    }

    .release-kicker {
      margin:0 0 8px;
      color:var(--oracle-red-dark);
      font-size:14px;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.06em;
    }

    .release h2 {
      margin:0;
      color:var(--ink);
      font-family:Georgia,"Times New Roman",serif;
      font-size:clamp(36px,5vw,58px);
      font-weight:400;
      line-height:1;
      letter-spacing:-.03em;
    }

    .release-summary {
      margin:16px 0 0;
      max-width:820px;
      color:var(--muted);
      font-size:18px;
    }

    .section {
      margin:0 0 34px;
    }

    .section h3 {
      color:var(--ink);
      margin:0 0 18px;
      font-family:Georgia,"Times New Roman",serif;
      font-size:30px;
      font-weight:400;
      line-height:1.15;
    }

    .group {
      margin:22px 0;
    }

    .group h4 {
      margin:0 0 10px;
      color:var(--text);
      font-size:17px;
      font-weight:700;
    }

    ul.notes {
      margin:0 0 0 20px;
      padding:0;
    }

    ul.notes li {
      margin:0 0 10px;
      padding-left:2px;
    }

    ul.notes ul {
      margin-top:8px;
      margin-left:18px;
      padding-left:0;
    }

    li::marker {
      color:var(--oracle-red);
    }

    code {
      background:#fff;
      border:1px solid var(--line);
      border-radius:2px;
      padding:1px 5px;
      font-family:"Courier New",ui-monospace,monospace;
      font-size:.95em;
      color:var(--ink);
    }

    .empty,
    .error {
      background:var(--panel);
      border:1px solid var(--line);
      border-top:3px solid var(--oracle-red);
      padding:24px;
    }

    .empty {
      color:var(--muted);
    }

    .error h2 {
      margin-top:0;
      font-family:Georgia,"Times New Roman",serif;
      font-weight:400;
    }

    .hidden {
      display:none;
    }

    @media(max-width:860px) {
      .masthead-inner,
      .hero-inner,
      .shell {
        width:min(100% - 28px,var(--max));
      }

      .shell {
        grid-template-columns:1fr;
        gap:26px;
      }

      .sidebar {
        position:static;
      }

      .version-button.active::after {
        display:none;
      }
    }
  </style>
</head>
<body>
  <header class="masthead">
    <div class="masthead-inner">
      <div class="brand">
<!----        <span class="brand-mark">Oracle</span>
        <span class="brand-title">Tools</span>
-->      </div>
      <div class="utility" id="mastheadUtility"></div>
    </div>
  </header>

  <section class="hero">
    <div class="hero-inner">
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <a href="#" id="breadcrumbRoot">APEXlang</a>
        <span>/</span>
        <span id="breadcrumbCurrent">Changelog</span>
      </nav>

      <h1 id="pageTitle">Release Notes</h1>
      <p id="pageDescription"></p>

      <div class="hero-actions">
        <a id="downloadLink" class="button hidden" href="#">Download</a>
      </div>
    </div>
  </section>

  <div class="shell">
    <aside class="sidebar" aria-label="Releases">
      <h2 id="releasesHeading">Releases</h2>
      <ul id="versionList" class="version-list"></ul>
    </aside>

    <main id="content" class="content" tabindex="-1"></main>
  </div>

  <script>
    const DATA_FILE = "https://raw.githubusercontent.com/oracle/skills/refs/heads/main/apex/apexlang/release-notes.json";

    const state = {
      changelog: null,
      releases: [],
      selectedVersion: null
    };

    const els = {
      mastheadUtility: document.getElementById("mastheadUtility"),
      pageTitle: document.getElementById("pageTitle"),
      pageDescription: document.getElementById("pageDescription"),
      breadcrumbRoot: document.getElementById("breadcrumbRoot"),
      breadcrumbCurrent: document.getElementById("breadcrumbCurrent"),
      downloadLink: document.getElementById("downloadLink"),
      releasesHeading: document.getElementById("releasesHeading"),
      versionList: document.getElementById("versionList"),
      content: document.getElementById("content")
    };

    async function loadChangelog() {
      try {
        const response = await fetch(DATA_FILE, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`Could not load ${DATA_FILE}: ${response.status} ${response.statusText}`);
        }

        setChangelog(await response.json());
      } catch (error) {
        renderLoadError(error);
      }
    }

    function setChangelog(data) {
      const normalized = normalizeChangelog(data);
      const hashVersion = getVersionFromHash();

      state.changelog = normalized;
      state.releases = normalized.releases;
      state.selectedVersion = state.releases.some(r => r.version === hashVersion)
        ? hashVersion
        : normalized.releases[0]?.version || null;

      document.title = normalized.title || "Changelog";
      els.pageTitle.textContent = normalized.title || "Changelog";
      els.pageDescription.textContent = normalized.description || "";
      els.mastheadUtility.textContent = normalized.mastheadUtility || "";
      els.breadcrumbRoot.textContent = normalized.breadcrumbRoot || "ORDS";
      els.breadcrumbCurrent.textContent = normalized.breadcrumbCurrent || "Changelog";
      els.releasesHeading.textContent = normalized.releasesHeading || "Releases";

      if (normalized.downloadUrl) {
        els.downloadLink.href = normalized.downloadUrl;
        els.downloadLink.textContent = normalized.downloadLabel || "Download";
        els.downloadLink.classList.remove("hidden");
      } else {
        els.downloadLink.classList.add("hidden");
      }

      renderVersions();
      renderAllReleases();

      if (hashVersion === state.selectedVersion) {
        requestAnimationFrame(scrollToSelectedRelease);
      }
    }

    function normalizeChangelog(data) {
      if (Array.isArray(data)) {
        return {
          title: "Changelog",
          description: "",
          releases: data.map(normalizeRelease)
        };
      }

      return {
        title: data.title || "Changelog",
        description: data.description || "",
        mastheadUtility: data.mastheadUtility || "",
        breadcrumbRoot: data.breadcrumbRoot || "ORDS",
        breadcrumbCurrent: data.breadcrumbCurrent || "Changelog",
        releasesHeading: data.releasesHeading || "Releases",
        downloadUrl: data.downloadUrl || "",
        downloadLabel: data.downloadLabel || "Download",
        releases: (Array.isArray(data.releases) ? data.releases : []).map(normalizeRelease)
      };
    }

    function normalizeRelease(release) {
      return {
        version: String(release.version || release.name || "Untitled"),
        date: release.date || "",
        summary: release.summary || "",
        sections: Array.isArray(release.sections) ? release.sections.map(normalizeSection) : []
      };
    }

    function normalizeSection(section) {
      return {
        title: section.title || section.name || "Notes",
        groups: Array.isArray(section.groups) ? section.groups.map(normalizeGroup) : [
          {
            title: "",
            items: Array.isArray(section.items) ? section.items : []
          }
        ]
      };
    }

    function normalizeGroup(group) {
      return {
        title: group.title || group.name || "",
        items: Array.isArray(group.items) ? group.items : []
      };
    }

    function renderVersions() {
      els.versionList.innerHTML = "";

      if (!state.releases.length) {
        els.versionList.innerHTML = `<li><div class="empty">No releases found.</div></li>`;
        return;
      }

      for (const release of state.releases) {
        const li = document.createElement("li");
        const button = document.createElement("button");

        button.type = "button";
        button.className = "version-button" + (release.version === state.selectedVersion ? " active" : "");
        button.setAttribute("aria-current", release.version === state.selectedVersion ? "true" : "false");
        button.innerHTML = `
          <span>${escapeHtml(release.version)}</span>
          ${release.date ? `<span class="version-date">${escapeHtml(release.date)}</span>` : ""}
        `;
        button.addEventListener("click", () => selectRelease(release.version));

        li.appendChild(button);
        els.versionList.appendChild(li);
      }
    }

    function selectRelease(version) {
      state.selectedVersion = version;
      const nextHash = encodeURIComponent(version);

      if (window.location.hash.slice(1) === nextHash) {
        renderVersions();
        scrollToSelectedRelease();
        return;
      }

      window.location.hash = nextHash;
    }

    function renderAllReleases() {
      if (!state.releases.length) {
        els.content.innerHTML = `<div class="empty">No releases found.</div>`;
        return;
      }

      els.content.innerHTML = state.releases.map(renderRelease).join("");
    }

    function renderRelease(release) {
      return `
        <article id="${escapeHtml(getReleaseId(release.version))}" class="release" tabindex="-1">
          <header class="release-header">
            <p class="release-kicker">Release${release.date ? ` • ${escapeHtml(release.date)}` : ""}</p>
            <h2>${escapeHtml(release.version)}</h2>
            ${release.summary ? `<p class="release-summary">${renderInline(release.summary)}</p>` : ""}
          </header>
          ${release.sections.map(renderSection).join("")}
        </article>
      `;
    }

    function scrollToSelectedRelease() {
      const release = document.getElementById(getReleaseId(state.selectedVersion));

      if (!release) {
        return;
      }

      release.scrollIntoView({ behavior: "smooth", block: "start" });
      release.focus({ preventScroll: true });
    }

    function renderSection(section) {
      return `
        <section class="section">
          <h3>${escapeHtml(section.title)}</h3>
          ${section.groups.map(renderGroup).join("")}
        </section>
      `;
    }

    function renderGroup(group) {
      const heading = group.title ? `<h4>${escapeHtml(group.title)}</h4>` : "";
      const items = group.items.length
        ? `<ul class="notes">${group.items.map(renderItem).join("")}</ul>`
        : `<p class="empty">No notes in this group.</p>`;

      return `<div class="group">${heading}${items}</div>`;
    }

    function renderItem(item) {
      if (typeof item === "string") {
        return `<li>${renderInline(item)}</li>`;
      }

      const text = item.text || item.title || "";
      const children = Array.isArray(item.items) ? item.items : [];

      return `
        <li>
          ${renderInline(text)}
          ${children.length ? `<ul>${children.map(renderItem).join("")}</ul>` : ""}
        </li>
      `;
    }

    function renderInline(value) {
      const escaped = escapeHtml(String(value));

      return escaped
        .replace(/`([^`]+)`/g, "<code>$1</code>")
        .replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
    }

    function renderLoadError(error) {
      els.versionList.innerHTML = "";
      els.content.innerHTML = `
        <div class="error">
          <h2>Could not load changelog</h2>
          <p>${escapeHtml(error.message)}</p>
          <p>Make sure <code>${DATA_FILE}</code> is in the same directory as this HTML file and that the page is served from a web server.</p>
        </div>
      `;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getVersionFromHash() {
      return window.location.hash ? decodeURIComponent(window.location.hash.slice(1)) : "";
    }

    function getReleaseId(version) {
      return `release-${encodeURIComponent(version)}`;
    }

    window.addEventListener("hashchange", () => {
      const version = getVersionFromHash();

      if (version && state.releases.some(r => r.version === version)) {
        state.selectedVersion = version;
        renderVersions();
        scrollToSelectedRelease();
      }
    });

    loadChangelog();
  </script>
</body>
</html>
